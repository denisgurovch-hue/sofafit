# Backup / mirror of production:
#   /root/furniture-inpaint-api/furniture-inpaint-api/nginx.conf
# Mounted in the API stack nginx container as /etc/nginx/conf.d/default.conf
# Sync when server config changes (scp/ssh or paste).

server {
    listen 80;
    server_name demo.sofafit.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name demo.sofafit.ru;

    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/demo.sofafit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.sofafit.ru/privkey.pem;

    location / {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}

